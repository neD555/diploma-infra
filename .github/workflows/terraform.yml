name: Terraform infrastructure

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.15.7

      - name: Write Yandex service account key
        env:
          YC_KEY_JSON: ${{ secrets.YC_SERVICE_ACCOUNT_KEY }}
        run: |
          mkdir -p ~/yc-keys
          printf '%s' "$YC_KEY_JSON" > yc-key.json

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.TF_BACKEND_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.TF_BACKEND_SECRET_KEY }}"

      - name: Terraform fmt
        run: terraform fmt -check

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan

      - name: Terraform apply
        if: github.event_name == 'workflow_dispatch' && inputs.apply == 'true'
        run: terraform apply -auto-approve
